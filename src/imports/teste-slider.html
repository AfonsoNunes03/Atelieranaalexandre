<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Centralização - Slider</title>
    <meta name="description"
        content="Página interna de teste do sistema de visualização de obras em contexto de espaço (mockup de parede).">

    <!-- Open Graph SEO -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Teste - Slider Art">
    <meta property="og:description" content="Página interna de teste do sistema de visualização de obras.">
    <meta property="og:image" content="https://anaalexandre.pt/assets/hero_atelier.jpg">

    <link rel="stylesheet" href="css/slider.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #1a1a1a;
            font-size: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }

        .artwork-demo {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .artwork-demo h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.1rem;
        }

        .slider-wrapper {
            width: 100%;
            min-height: 400px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }

        .info {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎨 Teste de Centralização - Todas as Obras</h1>
        <p style="text-align: center; margin-bottom: 30px; color: #666;">
            Arraste o slider em cada obra para verificar o posicionamento
        </p>

        <div class="grid" id="artworks-grid"></div>
    </div>

    <script src="js/slider.js"></script>
    <script>
        // Load products and create sliders
        fetch('data/products.json')
            .then(res => res.json())
            .then(products => {
                const grid = document.getElementById('artworks-grid');

                products.forEach((product, index) => {
                    const demo = document.createElement('div');
                    demo.className = 'artwork-demo';

                    const title = document.createElement('h3');
                    title.textContent = `${index + 1}. ${product.translations.pt.title}`;

                    const sliderDiv = document.createElement('div');
                    sliderDiv.className = 'slider-wrapper';
                    sliderDiv.id = `slider-${product.id}`;

                    const info = document.createElement('div');
                    info.className = 'info';
                    info.textContent = `${product.dimensions} • ${product.translations.pt.technique}`;

                    demo.appendChild(title);
                    demo.appendChild(sliderDiv);
                    demo.appendChild(info);
                    grid.appendChild(demo);

                    // Initialize slider
                    setTimeout(() => {
                        if (window.initComparisonSlider) {
                            window.initComparisonSlider(
                                `slider-${product.id}`,
                                'assets/wall_mockup_living_room_v2.png',
                                product.image,
                                product.image
                            );
                        }
                    }, 100 * index); // Stagger initialization
                });
            })
            .catch(err => {
                console.error('Error loading products:', err);
                document.getElementById('artworks-grid').innerHTML =
                    '<p style="text-align:center; color: red;">Erro ao carregar obras</p>';
            });
    </script>
</body>

</html>
